name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: pickcv-prod-001
  GCP_REGION: us-central1
  CLOUD_RUN_SERVICE: pickcv-backend
  CLOUD_SQL_INSTANCE: pickcv-prod-001:us-central1:pickcv-postgres
  FIREBASE_PROJECT_ID: studio-1324640898-76b00
  PRODUCTION_HOSTING_URL: https://studio-1324640898-76b00.web.app
  PRODUCTION_API_URL: https://pickcv-backend-318698650933.us-central1.run.app/api

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/318698650933/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: pickcv-staging-deployer@pickcv-prod-001.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Validate production configuration
        env:
          GEMINI_API_KEY_PROD: ${{ secrets.GEMINI_API_KEY_PROD }}
          SECRET_KEY_PROD: ${{ secrets.SECRET_KEY_PROD }}
          GOOGLE_CLIENT_ID_PROD: ${{ secrets.GOOGLE_CLIENT_ID_PROD }}
          GOOGLE_CLIENT_SECRET_PROD: ${{ secrets.GOOGLE_CLIENT_SECRET_PROD }}
          PROD_DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
          PROD_ALLOWED_ORIGINS: ${{ secrets.PROD_ALLOWED_ORIGINS }}
          PROD_FRONTEND_URL: ${{ secrets.PROD_FRONTEND_URL }}
        run: |
          set -euo pipefail

          for var_name in GEMINI_API_KEY_PROD SECRET_KEY_PROD GOOGLE_CLIENT_ID_PROD GOOGLE_CLIENT_SECRET_PROD PROD_DB_PASSWORD PROD_ALLOWED_ORIGINS PROD_FRONTEND_URL; do
            val="${!var_name}"
            if [ -z "$val" ] || [ "$val" = "-" ]; then
              echo "Invalid production secret: $var_name"
              exit 1
            fi
          done

          if [[ "$CLOUD_RUN_SERVICE" == *"staging"* ]]; then
            echo "CLOUD_RUN_SERVICE cannot point to staging in production workflow"
            exit 1
          fi

          if [[ "$CLOUD_SQL_INSTANCE" == *"staging"* ]]; then
            echo "CLOUD_SQL_INSTANCE cannot point to staging in production workflow"
            exit 1
          fi

          if [[ "$PRODUCTION_API_URL" == *"staging"* ]]; then
            echo "PRODUCTION_API_URL cannot contain staging host"
            exit 1
          fi

          if [[ "$PROD_ALLOWED_ORIGINS" == *"staging"* ]] || [[ "$PROD_FRONTEND_URL" == *"staging"* ]]; then
            echo "Production frontend/origin config cannot contain staging domains"
            exit 1
          fi

      - name: Deploy backend to Cloud Run (production)
        id: backend
        env:
          GEMINI_API_KEY_PROD: ${{ secrets.GEMINI_API_KEY_PROD }}
          SECRET_KEY_PROD: ${{ secrets.SECRET_KEY_PROD }}
          GOOGLE_CLIENT_ID_PROD: ${{ secrets.GOOGLE_CLIENT_ID_PROD }}
          GOOGLE_CLIENT_SECRET_PROD: ${{ secrets.GOOGLE_CLIENT_SECRET_PROD }}
          PROD_DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
          PROD_ALLOWED_ORIGINS: ${{ secrets.PROD_ALLOWED_ORIGINS }}
          PROD_FRONTEND_URL: ${{ secrets.PROD_FRONTEND_URL }}
        run: |
          gcloud run deploy "$CLOUD_RUN_SERVICE" \
            --source ./backend \
            --region "$GCP_REGION" \
            --project "$GCP_PROJECT_ID" \
            --allow-unauthenticated \
            --service-account "pickcv-backend-sa@pickcv-prod-001.iam.gserviceaccount.com" \
            --add-cloudsql-instances "$CLOUD_SQL_INSTANCE" \
            --memory 512Mi \
            --cpu 1 \
            --max-instances 10 \
            --timeout 300 \
            --set-env-vars "ENVIRONMENT=production,GEMINI_API_KEY=$GEMINI_API_KEY_PROD,SECRET_KEY=$SECRET_KEY_PROD,ALLOWED_ORIGINS=$PROD_ALLOWED_ORIGINS,FRONTEND_URL=$PROD_FRONTEND_URL,GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID_PROD,GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET_PROD,GOOGLE_REDIRECT_URI=$PRODUCTION_HOSTING_URL/auth/callback,DATABASE_URL=postgresql+asyncpg://postgres:$PROD_DB_PASSWORD@/pickcv?host=/cloudsql/$CLOUD_SQL_INSTANCE,STORAGE_BACKEND=local"

          # Keep production publicly reachable even with org policies restricting allUsers bindings
          gcloud run services update "$CLOUD_RUN_SERVICE" \
            --region "$GCP_REGION" \
            --project "$GCP_PROJECT_ID" \
            --no-invoker-iam-check

          BACKEND_URL=$(gcloud run services describe "$CLOUD_RUN_SERVICE" --region "$GCP_REGION" --project "$GCP_PROJECT_ID" --format='value(status.url)')
          echo "backend_url=$BACKEND_URL" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build frontend for production
        working-directory: frontend
        env:
          VITE_API_URL: ${{ env.PRODUCTION_API_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID_PROD }}
          VITE_GOOGLE_REDIRECT_URI: https://studio-1324640898-76b00.web.app/auth/callback
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
          npm run build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy frontend to Firebase Hosting (production target)
        run: firebase deploy --only hosting:production --project "$FIREBASE_PROJECT_ID" --non-interactive
