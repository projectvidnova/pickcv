name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: pickcv-prod-001
  GCP_REGION: us-central1
  FIREBASE_PROJECT_ID: studio-1324640898-76b00

jobs:
  # ─────────────────────────────────────────────
  # Deploy to Production
  # ─────────────────────────────────────────────
  deploy-production:
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUD_RUN_SERVICE: pickcv-backend
      CLOUD_SQL_INSTANCE: pickcv-prod-001:us-central1:pickcv-postgres
      HOSTING_URL: https://studio-1324640898-76b00.web.app
      API_URL: https://pickcv-backend-318698650933.us-central1.run.app/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/318698650933/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: pickcv-staging-deployer@pickcv-prod-001.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Validate production configuration
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_PROD }}
          SECRET_KEY: ${{ secrets.SECRET_KEY_PROD }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID_PROD }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET_PROD }}
          DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
          ALLOWED_ORIGINS: ${{ secrets.PROD_ALLOWED_ORIGINS }}
          FRONTEND_URL: ${{ secrets.PROD_FRONTEND_URL }}
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          for var_name in GEMINI_API_KEY SECRET_KEY GOOGLE_CLIENT_ID GOOGLE_CLIENT_SECRET DB_PASSWORD ALLOWED_ORIGINS FRONTEND_URL; do
            val="${!var_name}"
            if [ -z "$val" ] || [ "$val" = "-" ]; then
              echo "::error::Missing required secret: $var_name"
              exit 1
            fi
          done

      - name: Deploy backend to Cloud Run
        id: backend
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_PROD }}
          SECRET_KEY: ${{ secrets.SECRET_KEY_PROD }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID_PROD }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET_PROD }}
          DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
          ALLOWED_ORIGINS: ${{ secrets.PROD_ALLOWED_ORIGINS }}
          FRONTEND_URL: ${{ secrets.PROD_FRONTEND_URL }}
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
        run: |
          gcloud run deploy "$CLOUD_RUN_SERVICE" \
            --source ./backend \
            --region "$GCP_REGION" \
            --project "$GCP_PROJECT_ID" \
            --allow-unauthenticated \
            --service-account "pickcv-backend-sa@pickcv-prod-001.iam.gserviceaccount.com" \
            --add-cloudsql-instances "$CLOUD_SQL_INSTANCE" \
            --memory 512Mi \
            --cpu 1 \
            --max-instances 10 \
            --timeout 300 \
            --set-env-vars "ENVIRONMENT=production,GEMINI_API_KEY=$GEMINI_API_KEY,SECRET_KEY=$SECRET_KEY,ALLOWED_ORIGINS=$ALLOWED_ORIGINS,FRONTEND_URL=$FRONTEND_URL,GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET,GOOGLE_REDIRECT_URI=$HOSTING_URL/auth/callback,LINKEDIN_CLIENT_ID=$LINKEDIN_CLIENT_ID,LINKEDIN_CLIENT_SECRET=$LINKEDIN_CLIENT_SECRET,LINKEDIN_REDIRECT_URI=$HOSTING_URL/auth/callback,DATABASE_URL=postgresql+asyncpg://postgres:$DB_PASSWORD@/pickcv?host=/cloudsql/$CLOUD_SQL_INSTANCE,STORAGE_BACKEND=local,RESUME_DOWNLOAD_PRICE=49,SUBSCRIPTION_MONTHLY_PRICE=149,SUBSCRIPTION_YEARLY_PRICE=999,FREE_DOWNLOADS_LIMIT=1,SENDER_EMAIL=noreply@pickcv.com" \
            --set-secrets "ZOHO_PAYMENTS_ACCOUNT_ID=ZOHO_PAYMENTS_ACCOUNT_ID:latest,ZOHO_PAYMENTS_API_KEY=ZOHO_PAYMENTS_API_KEY:latest,ZOHO_PAYMENTS_OAUTH_TOKEN=ZOHO_PAYMENTS_OAUTH_TOKEN:latest,ZOHO_PAYMENTS_REFRESH_TOKEN=ZOHO_PAYMENTS_REFRESH_TOKEN:latest,ZOHO_PAYMENTS_SIGNING_KEY=ZOHO_PAYMENTS_SIGNING_KEY:latest,ZOHO_PAYMENTS_CLIENT_ID=ZOHO_PAYMENTS_CLIENT_ID:latest,ZOHO_PAYMENTS_CLIENT_SECRET=ZOHO_PAYMENTS_CLIENT_SECRET:latest,SENDGRID_API_KEY=SENDGRID_API_KEY:latest"

          gcloud run services update "$CLOUD_RUN_SERVICE" \
            --region "$GCP_REGION" \
            --project "$GCP_PROJECT_ID" \
            --no-invoker-iam-check

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ env.API_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID_PROD }}
          VITE_LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          VITE_LINKEDIN_REDIRECT_URI: ${{ env.HOSTING_URL }}/auth/callback
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
          npm run build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy frontend to Firebase Hosting
        run: firebase deploy --only hosting:production --project "$FIREBASE_PROJECT_ID" --non-interactive

  # ─────────────────────────────────────────────
  # Deploy to Staging (same code, staging infra)
  # ─────────────────────────────────────────────
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    env:
      CLOUD_RUN_SERVICE: pickcv-backend-staging
      CLOUD_SQL_INSTANCE: pickcv-prod-001:us-central1:pickcv-postgres-staging
      HOSTING_URL: https://pickcv-staging.web.app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/318698650933/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: pickcv-staging-deployer@pickcv-prod-001.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Deploy backend to Cloud Run
        id: backend
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_STAGING }}
          SECRET_KEY: ${{ secrets.SECRET_KEY_STAGING }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID_STAGING }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET_STAGING }}
          DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
        run: |
          gcloud run deploy "$CLOUD_RUN_SERVICE" \
            --source ./backend \
            --region "$GCP_REGION" \
            --project "$GCP_PROJECT_ID" \
            --allow-unauthenticated \
            --service-account "pickcv-backend-sa@pickcv-prod-001.iam.gserviceaccount.com" \
            --add-cloudsql-instances "$CLOUD_SQL_INSTANCE" \
            --memory 512Mi \
            --cpu 1 \
            --max-instances 10 \
            --timeout 300 \
            --set-env-vars "ENVIRONMENT=staging,GEMINI_API_KEY=$GEMINI_API_KEY,SECRET_KEY=$SECRET_KEY,ALLOWED_ORIGINS=$HOSTING_URL,FRONTEND_URL=$HOSTING_URL,GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET,GOOGLE_REDIRECT_URI=$HOSTING_URL/auth/callback,LINKEDIN_CLIENT_ID=$LINKEDIN_CLIENT_ID,LINKEDIN_CLIENT_SECRET=$LINKEDIN_CLIENT_SECRET,LINKEDIN_REDIRECT_URI=$HOSTING_URL/auth/callback,DATABASE_URL=postgresql+asyncpg://postgres:$DB_PASSWORD@/pickcv_staging?host=/cloudsql/$CLOUD_SQL_INSTANCE,STORAGE_BACKEND=local,RESUME_DOWNLOAD_PRICE=49,SUBSCRIPTION_MONTHLY_PRICE=149,SUBSCRIPTION_YEARLY_PRICE=999,FREE_DOWNLOADS_LIMIT=1,SENDER_EMAIL=noreply@pickcv.com" \
            --set-secrets "ZOHO_PAYMENTS_ACCOUNT_ID=ZOHO_PAYMENTS_ACCOUNT_ID:latest,ZOHO_PAYMENTS_API_KEY=ZOHO_PAYMENTS_API_KEY:latest,ZOHO_PAYMENTS_OAUTH_TOKEN=ZOHO_PAYMENTS_OAUTH_TOKEN:latest,ZOHO_PAYMENTS_REFRESH_TOKEN=ZOHO_PAYMENTS_REFRESH_TOKEN:latest,ZOHO_PAYMENTS_SIGNING_KEY=ZOHO_PAYMENTS_SIGNING_KEY:latest,ZOHO_PAYMENTS_CLIENT_ID=ZOHO_PAYMENTS_CLIENT_ID:latest,ZOHO_PAYMENTS_CLIENT_SECRET=ZOHO_PAYMENTS_CLIENT_SECRET:latest,SENDGRID_API_KEY=SENDGRID_API_KEY:latest"

          BACKEND_URL=$(gcloud run services describe "$CLOUD_RUN_SERVICE" --region "$GCP_REGION" --project "$GCP_PROJECT_ID" --format='value(status.url)')
          echo "backend_url=$BACKEND_URL" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ steps.backend.outputs.backend_url }}/api
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID_STAGING }}
          VITE_GOOGLE_REDIRECT_URI: https://pickcv-staging.web.app/auth/callback
          VITE_LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          VITE_LINKEDIN_REDIRECT_URI: ${{ env.HOSTING_URL }}/auth/callback
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
          npm run build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy frontend to Firebase Hosting
        run: firebase deploy --only hosting:staging --project "$FIREBASE_PROJECT_ID" --non-interactive

    outputs:
      backend_url: ${{ steps.backend.outputs.backend_url }}

  # ─────────────────────────────────────────────
  # E2E Smoke Tests (runs AFTER staging deploy)
  # ─────────────────────────────────────────────
  e2e-tests:
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: always() && needs.deploy-staging.result == 'success'
    environment: staging
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install E2E dependencies
        working-directory: e2e
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
          npx playwright install --with-deps chromium

      - name: Wait for staging to stabilize
        run: |
          echo "Waiting 30s for Cloud Run cold-start..."
          sleep 30

          # Verify backend is healthy
          BACKEND_URL="${{ needs.deploy-staging.outputs.backend_url }}"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' "$BACKEND_URL/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Backend is healthy"
              break
            fi
            echo "⏳ Attempt $i: status=$STATUS, retrying in 10s..."
            sleep 10
          done

      - name: Run E2E API tests
        working-directory: e2e
        env:
          STAGING_API_URL: ${{ needs.deploy-staging.outputs.backend_url }}
          STAGING_APP_URL: https://pickcv-staging.web.app
          E2E_CLEANUP_SECRET: ${{ secrets.SECRET_KEY_STAGING }}
        run: npx playwright test --project=api

      - name: Run E2E UI smoke tests
        if: always()
        working-directory: e2e
        env:
          STAGING_API_URL: ${{ needs.deploy-staging.outputs.backend_url }}
          STAGING_APP_URL: https://pickcv-staging.web.app
          E2E_CLEANUP_SECRET: ${{ secrets.SECRET_KEY_STAGING }}
        run: npx playwright test --project=ui

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-report
          path: e2e/playwright-report/
          retention-days: 14

      - name: Upload test traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-traces
          path: e2e/test-results/
          retention-days: 7
