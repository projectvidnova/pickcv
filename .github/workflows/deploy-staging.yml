name: Deploy Staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: pickcv-prod-001
  GCP_REGION: us-central1
  CLOUD_RUN_SERVICE: pickcv-backend-staging
  CLOUD_SQL_INSTANCE: pickcv-prod-001:us-central1:pickcv-postgres-staging
  FIREBASE_PROJECT_ID: studio-1324640898-76b00
  STAGING_HOSTING_URL: https://pickcv-staging.web.app

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/318698650933/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: pickcv-staging-deployer@pickcv-prod-001.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Validate staging configuration
        env:
          GEMINI_API_KEY_STAGING: ${{ secrets.GEMINI_API_KEY_STAGING }}
          SECRET_KEY_STAGING: ${{ secrets.SECRET_KEY_STAGING }}
          GOOGLE_CLIENT_ID_STAGING: ${{ secrets.GOOGLE_CLIENT_ID_STAGING }}
          GOOGLE_CLIENT_SECRET_STAGING: ${{ secrets.GOOGLE_CLIENT_SECRET_STAGING }}
          STAGING_DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
        run: |
          set -euo pipefail

          for var_name in GEMINI_API_KEY_STAGING SECRET_KEY_STAGING GOOGLE_CLIENT_ID_STAGING GOOGLE_CLIENT_SECRET_STAGING STAGING_DB_PASSWORD; do
            val="${!var_name}"
            if [ -z "$val" ] || [ "$val" = "-" ]; then
              echo "Invalid staging secret: $var_name"
              exit 1
            fi
          done

          if [[ "$CLOUD_RUN_SERVICE" != *"staging"* ]]; then
            echo "CLOUD_RUN_SERVICE must be a staging service"
            exit 1
          fi

          if [[ "$CLOUD_SQL_INSTANCE" != *"staging"* ]]; then
            echo "CLOUD_SQL_INSTANCE must be a staging instance"
            exit 1
          fi

          if [[ "$STAGING_HOSTING_URL" != *"pickcv-staging.web.app"* ]]; then
            echo "STAGING_HOSTING_URL is unexpected"
            exit 1
          fi

      - name: Deploy backend to Cloud Run (staging)
        id: backend
        env:
          GEMINI_API_KEY_STAGING: ${{ secrets.GEMINI_API_KEY_STAGING }}
          SECRET_KEY_STAGING: ${{ secrets.SECRET_KEY_STAGING }}
          GOOGLE_CLIENT_ID_STAGING: ${{ secrets.GOOGLE_CLIENT_ID_STAGING }}
          GOOGLE_CLIENT_SECRET_STAGING: ${{ secrets.GOOGLE_CLIENT_SECRET_STAGING }}
          STAGING_DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
        run: |
          gcloud run deploy "$CLOUD_RUN_SERVICE" \
            --source ./backend \
            --region "$GCP_REGION" \
            --project "$GCP_PROJECT_ID" \
            --allow-unauthenticated \
            --service-account "pickcv-backend-sa@pickcv-prod-001.iam.gserviceaccount.com" \
            --add-cloudsql-instances "$CLOUD_SQL_INSTANCE" \
            --memory 512Mi \
            --cpu 1 \
            --max-instances 10 \
            --timeout 300 \
            --set-env-vars "ENVIRONMENT=staging,GEMINI_API_KEY=$GEMINI_API_KEY_STAGING,SECRET_KEY=$SECRET_KEY_STAGING,ALLOWED_ORIGINS=$STAGING_HOSTING_URL,FRONTEND_URL=$STAGING_HOSTING_URL,GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID_STAGING,GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET_STAGING,GOOGLE_REDIRECT_URI=$STAGING_HOSTING_URL/auth/callback,DATABASE_URL=postgresql+asyncpg://postgres:$STAGING_DB_PASSWORD@/pickcv_staging?host=/cloudsql/$CLOUD_SQL_INSTANCE,STORAGE_BACKEND=local,RESUME_DOWNLOAD_PRICE=49,SUBSCRIPTION_MONTHLY_PRICE=149,SUBSCRIPTION_YEARLY_PRICE=999,FREE_DOWNLOADS_LIMIT=1" \
            --set-secrets "ZOHO_PAYMENTS_ACCOUNT_ID=ZOHO_PAYMENTS_ACCOUNT_ID:latest,ZOHO_PAYMENTS_API_KEY=ZOHO_PAYMENTS_API_KEY:latest,ZOHO_PAYMENTS_OAUTH_TOKEN=ZOHO_PAYMENTS_OAUTH_TOKEN:latest,ZOHO_PAYMENTS_REFRESH_TOKEN=ZOHO_PAYMENTS_REFRESH_TOKEN:latest,ZOHO_PAYMENTS_SIGNING_KEY=ZOHO_PAYMENTS_SIGNING_KEY:latest,ZOHO_PAYMENTS_CLIENT_ID=ZOHO_PAYMENTS_CLIENT_ID:latest,ZOHO_PAYMENTS_CLIENT_SECRET=ZOHO_PAYMENTS_CLIENT_SECRET:latest"

          BACKEND_URL=$(gcloud run services describe "$CLOUD_RUN_SERVICE" --region "$GCP_REGION" --project "$GCP_PROJECT_ID" --format='value(status.url)')
          echo "backend_url=$BACKEND_URL" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build frontend for staging
        working-directory: frontend
        env:
          VITE_API_URL: ${{ steps.backend.outputs.backend_url }}/api
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID_STAGING }}
          VITE_GOOGLE_REDIRECT_URI: https://pickcv-staging.web.app/auth/callback
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
          npm run build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy frontend to Firebase Hosting (staging target)
        run: firebase deploy --only hosting:staging --project "$FIREBASE_PROJECT_ID" --non-interactive
